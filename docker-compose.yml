# docker-compose.yml
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: oferta
      POSTGRES_PASSWORD: oferta
      POSTGRES_DB: oferta_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
